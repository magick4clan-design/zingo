version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: zingo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zingo
      POSTGRES_PASSWORD: zingo_password_2024
      POSTGRES_DB: zingo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: zingo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
